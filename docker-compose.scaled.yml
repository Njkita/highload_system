# iter-3 overlay: добавляет вторые инстансы catalog/order и переключает nginx на upstream
# с двумя серверами. Запуск:
#
#   docker compose -f docker-compose.yml -f docker-compose.scaled.yml up -d --build
#
# CPU/RAM каждого сервиса режется в два раза, чтобы суммарно остаться в тех же пределах,
# что и до scaling — это честно показывает, помогло горизонтальное масштабирование или нет.

services:

  catalog:
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 192M
    mem_limit: 192m
    cpus: 0.20

  catalog-2:
    build:
      context: ./services/catalog
    environment:
      HTTP_ADDR:      ":8081"
      PG_DSN:         "postgres://food:food@postgres:5432/fooddelivery?sslmode=disable"
      REDIS_ADDR:     "redis:6379"
      CACHE_ENABLED:  "true"
      CACHE_TTL:      "60s"
      PG_MAX_CONNS:   "16"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/readyz | grep -q ok"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 192M
    mem_limit: 192m
    cpus: 0.20

  order:
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 192M
    mem_limit: 192m
    cpus: 0.20

  order-2:
    build:
      context: ./services/order
    environment:
      HTTP_ADDR:      ":8082"
      PG_DSN:         "postgres://food:food@postgres:5432/fooddelivery?sslmode=disable"
      REDIS_ADDR:     "redis:6379"
      CATALOG_URL:    "http://catalog:8081"
      CACHE_ENABLED:  "true"
      PG_MAX_CONNS:   "20"
      RATE_RPS:       "100"
      RATE_BURST:     "200"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      catalog:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/readyz | grep -q ok"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 192M
    mem_limit: 192m
    cpus: 0.20

  gateway:
    volumes:
      - ./nginx/nginx.scaled.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      catalog:
        condition: service_healthy
      catalog-2:
        condition: service_healthy
      order:
        condition: service_healthy
      order-2:
        condition: service_healthy
      payment:
        condition: service_healthy
