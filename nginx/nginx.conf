# API Gateway pattern: единая точка входа на 8080, маршрутизация по
# префиксам /api/v1/* в отдельные сервисы.
#
# worker_processes пинаем в 2 (а не auto): на хосте может быть 64 ядра, и
# auto разворачивает 64 воркера, которые при memory limit 96M на старте
# попадают под OOM. 2 воркера — VM-симуляция для baseline; iter-1 поднимает
# memory limit и переключает обратно на auto.

worker_processes 2;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30s;
    keepalive_requests 1000;
    server_tokens off;

    log_format upst '$remote_addr "$request" $status ${request_time}s ${upstream_response_time}s';
    access_log /var/log/nginx/access.log upst;

    upstream catalog_up {
        server catalog:8081 max_fails=2 fail_timeout=5s;
        keepalive 64;
    }
    upstream order_up {
        server order:8082 max_fails=2 fail_timeout=5s;
        keepalive 64;
    }
    upstream payment_up {
        server payment:8083 max_fails=2 fail_timeout=5s;
        keepalive 64;
    }

    server {
        listen 8080;

        # gateway-level health (используется compose'ом)
        location = /health {
            return 200 "ok";
        }

        location ~ ^/api/v1/restaurants {
            proxy_pass http://catalog_up;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 1s;
            proxy_read_timeout 5s;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # порядок: сначала /payment-эндпоинт payment-svc, потом всё остальное в order
        location ~ ^/api/v1/orders/[^/]+/payment$ {
            proxy_pass http://payment_up;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 1s;
            proxy_read_timeout 6s;
        }

        location ~ ^/api/v1/orders {
            proxy_pass http://order_up;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 1s;
            proxy_read_timeout 5s;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = /webhooks/psp {
            proxy_pass http://payment_up;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location = / {
            return 200 "highload_system PoC\n";
        }
    }
}
