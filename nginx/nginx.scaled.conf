# iter-3 scaled gateway: balance round-robin по двум инстансам catalog и order.

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30s;
    keepalive_requests 1000;
    server_tokens off;

    # least_conn вместо round-robin: запросы летят к инстансу с меньшим числом
    # активных соединений. Это критично, когда один инстанс цепляется за более
    # медленные запросы (cache miss + БД, create_order с PSP latency 120±80ms),
    # пока другой простаивает — у round-robin при таких разноскоростных запросах
    # хвост вытягивает p99.
    upstream catalog_up {
        least_conn;
        server catalog:8081   max_fails=2 fail_timeout=5s;
        server catalog-2:8081 max_fails=2 fail_timeout=5s;
        keepalive 64;
    }
    upstream order_up {
        least_conn;
        server order:8082   max_fails=2 fail_timeout=5s;
        server order-2:8082 max_fails=2 fail_timeout=5s;
        keepalive 64;
    }
    upstream payment_up {
        server payment:8083 max_fails=2 fail_timeout=5s;
        keepalive 64;
    }

    server {
        listen 8080;

        location = /health { return 200 "ok"; }

        location ~ ^/api/v1/restaurants {
            proxy_pass http://catalog_up;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 1s;
            proxy_read_timeout 5s;
        }

        location ~ ^/api/v1/orders/[^/]+/payment$ {
            proxy_pass http://payment_up;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 1s;
            proxy_read_timeout 6s;
        }

        location ~ ^/api/v1/orders {
            proxy_pass http://order_up;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 1s;
            proxy_read_timeout 5s;
        }

        location = /webhooks/psp {
            proxy_pass http://payment_up;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location = / { return 200 "highload_system PoC (scaled)\n"; }
    }
}
